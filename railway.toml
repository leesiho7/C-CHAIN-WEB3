[build]
builder = "NIXPACKS"
# 빌드는 일회성 — 넉넉하게 1g 할당 (G1GC: 대용량 힙 + 멀티스레드 컴파일에 적합)
buildCommand = "MAVEN_OPTS='-Xmx1g -XX:MaxMetaspaceSize=256m -XX:+UseG1GC' ./mvnw package -DskipTests -q"

[deploy]
# Railway 유료 플랜 1GB 한도 기준:
# Heap 512m + Metaspace 128m + CodeCache 64m + JVM오버헤드 ~80m = ≈784m (여유 ~240m)
startCommand = "java -XX:+UseG1GC -Xmx512m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=64m -XX:MaxHeapFreeRatio=30 -XX:MinHeapFreeRatio=10 -Djava.security.egd=file:/dev/./urandom -jar target/cchain-0.1.jar"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
