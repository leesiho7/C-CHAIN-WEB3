[build]
builder = "NIXPACKS"
# 빌드는 일회성 — 넉넉하게 1g 할당 (G1GC: 대용량 힙 + 멀티스레드 컴파일에 적합)
buildCommand = "MAVEN_OPTS='-Xmx1g -XX:MaxMetaspaceSize=256m -XX:+UseG1GC' ./mvnw package -DskipTests -q"

[deploy]
# 런타임은 절약 — 512m 고정 + SerialGC (소형 힙에서 오버헤드 최소)
startCommand = "java -XX:+UseSerialGC -Xmx512m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=64m -Djava.security.egd=file:/dev/./urandom -jar target/cchain-0.1.jar"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
