# 1. Server Port (Railway가 정해주는 포트를 사용합니다)
server.port=${PORT:8080}

# Railway HTTPS 프록시 설정 (없으면 리다이렉트가 http://로 생성 → Mixed Content 발생)
server.forward-headers-strategy=NATIVE

# 2. MySQL Database Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Railway 내부 변수(MYSQLHOST 등)를 직접 사용하도록 수정했습니다.
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# JPA/Hibernate 설정
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Batch Insert 성능 최적화
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# 3. 임시 비활성화 (나중에 하나씩 추가할 부분들)
# 현재는 배포 시 에러를 막기 위해 기본값만 설정해둡니다.
# Web3j / ERC-20 Token Settings
ethereum.rpc.url=${ETHEREUM_RPC_URL:none}
token.contract.address=${TOKEN_CONTRACT_ADDRESS:none}
ethereum.wallet.private-key=${ETHEREUM_WALLET_PRIVATE_KEY:none}
ethereum.admin.address=${ETHEREUM_ADMIN_ADDRESS:none}

# Gemini API 설정
openai.api.key=${OPENAI_API_KEY:none}

# CoinGecko API
coingecko.api.key=${COINGECKO_API_KEY:}

# 4. File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. Redis Settings (일단 로컬 호스트로 기본값 설정)
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}

# 6. VectorDB (PostgreSQL + pgvector)
# Railway에 VECTORDB_HOST 등 수동 설정한 환경변수만 사용 (primary DB와 완전 분리)
# VECTOR_DB_ENABLED=true 설정 시에만 Flyway 활성화 (기본 비활성 → primary DB 건드리지 않음)
spring.flyway.url=jdbc:postgresql://${VECTORDB_HOST:localhost}:${VECTORDB_PORT:5432}/${VECTORDB_DATABASE:vectordb}
spring.flyway.user=${VECTORDB_USER:postgres}
spring.flyway.password=${VECTORDB_PASSWORD:}
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=${VECTOR_DB_ENABLED:false}