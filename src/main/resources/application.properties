# 1. Server Port (Railway 환경 대응)
server.port=${PORT:8090}

# Railway HTTPS 프록시 설정 (Mixed Content 에러 방지)
server.forward-headers-strategy=NATIVE

# 2. MySQL Database Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# JPA 설정 (OOM 방지를 위한 최적화)
spring.jpa.open-in-view=false
spring.main.lazy-initialization=true

# HikariCP 커넥션 풀 최소화 (10명 이하 트래픽 최적화)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Tomcat 성능 다이어트 (메모리 부족 해결책)
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=10

# 로깅 레벨 최소화 (성능 확보)
logging.level.root=WARN
logging.level.com.tem.cchain=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=WARN

# 3. 외부 API 설정
openai.api.key=${OPENAI_API_KEY:none}
coingecko.api.key=${COINGECKO_API_KEY:}

# 4. 파일 업로드 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. Redis Settings
spring.data.redis.host=${REDIS_HOST:${REDISHOST:localhost}}
spring.data.redis.port=${REDIS_PORT:${REDISPORT:6379}}
spring.data.redis.password=${REDIS_PASSWORD:${REDISPASSWORD:}}

# ---------------------------------------------------------
# 7. AI Agent Settings (파이썬 에이전트 연결)
# ---------------------------------------------------------
# 알려주신 Railway 도메인 주소를 기본값으로 설정했습니다.
ai.agent.url=${AI_AGENT_URL:https://python-eliottwave-impulse-full-count-version-10-production.up.railway.app}

# 8. Web3j / ERC-20 Settings
ethereum.rpc.url=${ETHEREUM_RPC_URL:none}
token.contract.address=${TOKEN_CONTRACT_ADDRESS:none}
# KMS 도입 이후 실제 서명에는 사용하지 않지만, Web3Config 빈 생성 조건 체크에 사용됨
ethereum.wallet.private-key=${ETHEREUM_WALLET_PRIVATE_KEY:none}
ethereum.admin.address=${ETHEREUM_ADMIN_ADDRESS:none}

# =================================================================
# 9. Enterprise Wallet Security Layer
# =================================================================

# ---- AWS KMS 설정 ----
# KMS 키 ARN: AWS Console > KMS > 키 생성 (ECC_SECG_P256K1 타입)
# 예: arn:aws:kms:ap-northeast-2:123456789012:key/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
wallet.kms.key-id=${WALLET_KMS_KEY_ID:arn:aws:kms:ap-southeast-2:052464239820:key/79eb15ae-968d-49a6-886d-cc0bf4d7fb9f}
wallet.kms.region=${WALLET_KMS_REGION:ap-southeast-2}

# 블록체인 Chain ID (1=Ethereum Mainnet, 11155111=Sepolia, 137=Polygon)
wallet.chain-id=${WALLET_CHAIN_ID:11155111}

# ---- Policy as Code (Pac Engine) 설정 ----
# OPA 사용 여부 (false=내장 룰엔진, true=OPA Docker 필요)
wallet.opa.enabled=${WALLET_OPA_ENABLED:false}
wallet.opa.url=${WALLET_OPA_URL:http://localhost:8181}
wallet.opa.policy-path=wallet/allow

# ---- 정책 한도 설정 (FallbackWalletPolicyEngine 사용 시) ----
# 1회 최대 전송량 (OMT 단위)
wallet.policy.max-single-transfer=${WALLET_MAX_SINGLE_TRANSFER:10000}
# 일일 최대 누적 전송량 (OMT 단위)
wallet.policy.max-daily-transfer=${WALLET_MAX_DAILY_TRANSFER:100000}

# ---- Audit 로깅 ----
# wallet_audit_events 테이블은 JPA DDL auto 또는 Flyway 마이그레이션으로 생성
# (spring.jpa.hibernate.ddl-auto=update 환경에서는 자동 생성)

# ---- 입금 지원 토큰 컨트랙트 주소 (Sepolia Testnet) ----
# USDT/USDC (Sepolia 공식 USDC = USDT 대용)
wallet.deposit.usdt-contract=${DEPOSIT_USDT_CONTRACT:0x1c7d4b196cb0c7b01d743fbc6116a902379c7238}

# =================================================================
# 10. 거래소 API 키 암호화 & Bybit OAuth
# =================================================================
# AES-256-GCM 암호화 키 (32바이트 이상 임의 문자열 권장)
# Railway 환경변수: EXCHANGE_KEY_ENC_SECRET
exchange.key.enc.secret=${EXCHANGE_KEY_ENC_SECRET:changeme-set-this-in-railway-env}

# Bybit OAuth 2.0 (Fast Connect) — Bybit 브로커 파트너 등록 후 발급
# 가입: https://partner.bybit.com/
# Railway 환경변수: BYBIT_OAUTH_CLIENT_ID, BYBIT_OAUTH_CLIENT_SECRET
# redirect_uri 는 Railway 도메인 + /api/exchange/bybit/oauth/callback 으로 설정
bybit.oauth.client-id=${BYBIT_OAUTH_CLIENT_ID:}
bybit.oauth.client-secret=${BYBIT_OAUTH_CLIENT_SECRET:}
bybit.oauth.redirect-uri=${BYBIT_OAUTH_REDIRECT_URI:http://localhost:8090/api/exchange/bybit/oauth/callback}

# =================================================================
# 11. 한중 IT 기여 보상 설정
# =================================================================
# 번역 검증 1건 승인 시 지급할 OMT 보상량
contribution.reward.amount-per-case=${CONTRIBUTION_REWARD_AMOUNT:10}