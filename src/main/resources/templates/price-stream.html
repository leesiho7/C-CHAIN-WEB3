<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | 실시간 분석 터미널</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* (기존 스타일 유지) */
        * { font-family: 'Pretendard', sans-serif; }
        body { background: linear-gradient(to bottom right, #f9fafb, #dbeafe, #fef3c7); min-height: 100vh; }
        .price-up { animation: flash-green 0.8s ease; }
        .price-down { animation: flash-red 0.8s ease; }
        @keyframes flash-green { 0%, 100% { background-color: white; } 50% { background-color: rgba(34, 197, 94, 0.1); } }
        @keyframes flash-red { 0%, 100% { background-color: white; } 50% { background-color: rgba(239, 68, 68, 0.1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #bot-arena-drawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32,0.72,0,1); }
        #bot-arena-drawer.open { transform: translateY(0); }
    </style>
</head>
<body>
    <main class="p-8">
        <div class="max-w-7xl mx-auto">
            <div class="mt-12 grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white rounded-3xl p-6 shadow-sm border border-gray-100 h-[550px] flex flex-col">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-chart-line text-blue-600"></i> 실시간 기술적 분석 & AI 오버레이
                    </h3>
                    <div id="tradingview_widget" class="flex-1 rounded-2xl overflow-hidden border border-gray-50"></div>
                </div>

                <div class="bg-slate-900 rounded-3xl p-6 shadow-xl text-white flex flex-col h-[550px]">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center animate-pulse shadow-lg shadow-blue-500/20">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <div>
                            <h3 class="font-bold">Dober AI Agent</h3>
                            <p class="text-[10px] text-blue-300 uppercase tracking-widest font-bold">Strategy: Visual Elliottwave Scan</p>
                        </div>
                    </div>
                    
                    <div id="ai-chat-history" class="flex-1 overflow-y-auto text-sm space-y-4 mb-4 pr-2 no-scrollbar">
                        </div>

                    <div class="relative">
                        <input type="text" id="ai-input" placeholder="분석 질문을 입력하세요..." 
                               class="w-full bg-slate-800 border-none rounded-xl py-4 px-4 text-sm focus:ring-2 focus:ring-blue-500 text-white">
                        <button onclick="askAI()" class="absolute right-2 top-2 w-10 h-10 text-blue-500 hover:text-blue-400 transition-colors">
                            <i class="fa-solid fa-paper-plane text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let tvWidget = null; // 트레이딩뷰 위젯 객체 저장용

        // 1. 트레이딩뷰 초기화 (onChartReady 콜백 추가)
        function initTradingView() {
            tvWidget = new TradingView.widget({
                "container_id": "tradingview_widget",
                "autosize": true,
                "symbol": "BYBIT:BTCUSDT",
                "interval": "60",
                "timezone": "Asia/Seoul",
                "theme": "light",
                "style": "1",
                "locale": "ko",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "studies": ["RSI@tv-basicstudies"],
                "onChartReady": function() {
                    console.log("✅ TradingView 차트 준비 완료");
                }
            });
        }

        // 2. [핵심] AI 분석 및 시각화 로직
        async function askAI() {
            const input = document.getElementById('ai-input');
            const history = document.getElementById('ai-chat-history');
            if (!input.value.trim()) return;

            const userText = input.value.trim();
            input.value = '';
            
            // 사용자 말풍선 추가
            const userDiv = document.createElement('div');
            userDiv.className = 'flex justify-end';
            userDiv.innerHTML = `<p class="bg-blue-600 p-3 rounded-2xl max-w-[80%]">${userText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;
            history.appendChild(userDiv);

            // 로딩 말풍선
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'flex gap-2';
            loadingDiv.innerHTML = `<div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px]">AI</div><p class="bg-slate-800 p-3 rounded-2xl italic animate-pulse">파동 데이터 시각화 중...</p>`;
            history.appendChild(loadingDiv);
            history.scrollTop = history.scrollHeight;

            try {
                // Bybit 데이터 로드 (자바/파이썬에 전달용)
                const klineRes = await fetch('https://api.bybit.com/v5/market/kline?category=spot&symbol=BTCUSDT&interval=60&limit=100');
                const klineJson = await klineRes.json();
                const rawList = klineJson.result?.list ?? [];
                const candleData = JSON.stringify(rawList.map(c => ({
                    timestamp: parseInt(c[0]),
                    open: c[1], high: c[2], low: c[3], close: c[4]
                })));

                // Java 백엔드 호출
                const res = await fetch('/api/ai/quant-analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol: 'BTCUSDT',
                        btcPrice: 0, // 실제 가격 연동 필요 시 주입
                        candleData: candleData,
                        question: userText
                    })
                });

                const data = await res.json();
                
                // 3. AI 리포트 출력
                const answer = (data.answer || '응답 없음').replace(/\n/g, '<br>');
                loadingDiv.innerHTML = `<div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px]">AI</div><p class="bg-slate-800 p-3 rounded-2xl">${answer}</p>`;

                // 4. [신규] 차트 시각화 오버레이 (TradingView Shapes/Labels)
                if (data.visualData && data.visualData.points) {
                    console.log("📊 시각화 좌표 적용 시작:", data.visualData.points);
                    
                    data.visualData.points.forEach(point => {
                        // 차트 위에 텍스트 라벨(화살표 포함) 생성
                        tvWidget.chart().createShape({
                            time: parseInt(point.timestamp) / 1000, // TV는 초 단위 타임스탬프 사용
                            price: parseFloat(point.price),
                        }, {
                            shape: point.type === 'high' ? 'arrow_down' : 'arrow_up',
                            text: point.label + "파",
                            lock: true,
                            disableSelection: true,
                            overrides: {
                                color: point.type === 'high' ? "#ff9800" : "#2196f3",
                                textcolor: "#ffffff",
                                fontsize: 12,
                                fontweight: "bold"
                            }
                        });
                    });
                }

            } catch (e) {
                loadingDiv.innerHTML = `<p class="text-red-400">오류 발생: ${e.message}</p>`;
            }
            history.scrollTop = history.scrollHeight;
        }

        // 초기화 실행
        document.addEventListener('DOMContentLoaded', () => {
            initTradingView();
            // (기존 WebSocket 및 카드 렌더링 함수 호출 코드 유지)
        });
 
        // ── Bot Arena ────────────────────────────────────────────────---------------------------------------------------------------------------------------------------------------------------------------------
        let baChart = null;
        const baIndicators = { rsi: true, bollinger: false, regression: true, macd: false };

        function toggleBotArena() {
            const drawer = document.getElementById('bot-arena-drawer');
            const backdrop = document.getElementById('bot-arena-backdrop');
            const isOpen = drawer.classList.contains('open');
            if (isOpen) {
                drawer.classList.remove('open');
                backdrop.classList.add('hidden');
            } else {
                backdrop.classList.remove('hidden');
                requestAnimationFrame(() => drawer.classList.add('open'));
            }
        }

        function baToggle(name) {
            baIndicators[name] = !baIndicators[name];
            const btn = document.getElementById('ba-btn-' + name);
            btn.classList.toggle('active', baIndicators[name]);
        }

        function baRunBacktest() {
            // 시뮬레이션 백테스팅 (실제 BTC 가격 기반 난수 시드)
            const seed = 97000; // prices 객체 제거됨 — 고정 시드 사용
            const trades = [];
            let equity = 10000, wins = 0, maxEq = 10000, maxDD = 0;
            const equityHistory = [equity];
            const now = new Date();

            for (let i = 0; i < 30; i++) {
                const rand = ((seed * (i + 1) * 9301 + 49297) % 233280) / 233280;
                const isWin = rand > 0.42;
                const pct = isWin ? (rand * 8 + 1) : -(rand * 6 + 1);
                const posSize = parseInt(document.querySelector('[oninput*="ba-ps-val"]').value) / 100;
                const gain = equity * posSize * (pct / 100);
                equity += gain;
                if (equity > maxEq) maxEq = equity;
                const dd = ((maxEq - equity) / maxEq) * 100;
                if (dd > maxDD) maxDD = dd;
                if (isWin) wins++;
                equityHistory.push(Math.round(equity));

                const d = new Date(now); d.setDate(d.getDate() - (30 - i));
                trades.push({
                    date: `${d.getMonth()+1}/${d.getDate()}`,
                    type: rand > 0.5 ? 'LONG' : 'SHORT',
                    entry: (seed * (0.95 + rand * 0.1)).toFixed(0),
                    pct: pct.toFixed(2)
                });
            }

            const totalReturn = ((equity - 10000) / 10000 * 100).toFixed(2);
            document.getElementById('ba-total-return').innerText = (totalReturn > 0 ? '+' : '') + totalReturn + '%';
            document.getElementById('ba-total-return').className = 'text-xl font-bold ' + (totalReturn > 0 ? 'text-blue-600' : 'text-red-500');
            document.getElementById('ba-max-drawdown').innerText = maxDD.toFixed(2) + '%';
            document.getElementById('ba-win-rate').innerText = (wins / 30 * 100).toFixed(1) + '%';
            document.getElementById('ba-total-trades').innerText = 30;

            // Equity Curve 차트
            if (baChart) baChart.destroy();
            baChart = new Chart(document.getElementById('ba-equityChart'), {
                type: 'line',
                data: {
                    labels: equityHistory.map((_, i) => i === 0 ? '시작' : i + '일'),
                    datasets: [{
                        data: equityHistory,
                        borderColor: totalReturn > 0 ? '#2563eb' : '#ef4444',
                        backgroundColor: totalReturn > 0 ? 'rgba(37,99,235,0.08)' : 'rgba(239,68,68,0.08)',
                        borderWidth: 2, pointRadius: 0, fill: true, tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#f1f5f9' } } } }
            });

            // 거래 내역 (최근 8개)
            const tbody = document.getElementById('ba-trade-log');
            tbody.innerHTML = trades.slice(-8).reverse().map(t => `
                <tr class="border-b border-slate-50">
                    <td class="py-2 px-2 text-slate-500">${t.date}</td>
                    <td class="py-2 px-2"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${t.type==='LONG' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-500'}">${t.type}</span></td>
                    <td class="py-2 px-2 text-right text-slate-600">$${parseInt(t.entry).toLocaleString()}</td>
                    <td class="py-2 px-2 text-right font-bold ${parseFloat(t.pct)>0 ? 'text-blue-600' : 'text-red-500'}">${parseFloat(t.pct)>0?'+':''}${t.pct}%</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
