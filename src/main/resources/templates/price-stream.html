<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | 실시간 가격 스트림</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Pretendard', sans-serif; }
        body {
            background: linear-gradient(to bottom right, #f9fafb, #dbeafe, #fef3c7);
            min-height: 100vh;
        }
        .price-up { animation: flash-green 0.8s ease; }
        .price-down { animation: flash-red 0.8s ease; }
        @keyframes flash-green {
            0%, 100% { background-color: white; }
            50% { background-color: rgba(34, 197, 94, 0.1); }
        }
        @keyframes flash-red {
            0%, 100% { background-color: white; }
            50% { background-color: rgba(239, 68, 68, 0.1); }
        }
    </style>
</head>
<body>
    <header class="bg-white border-b px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="/main" class="flex items-center space-x-2 text-blue-600">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    <span class="text-2xl font-bold">C-Chain</span>
                </a>
                <span class="text-gray-400">|</span>
                <nav class="flex items-center gap-4">
                    <a href="/main"          class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">대시보드</a>
                    <a href="/indexer"       class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">트랜잭션 인덱서</a>
                    <a href="/exchange"      class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">지갑 &amp; 거래소</a>
                    <a href="/price"         class="px-4 py-2 rounded-lg text-sm transition bg-blue-50 text-blue-600 font-semibold">실시간 가격</a>
                    <a href="/wallet-server" class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">지갑 서버</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right mr-4">
                    <p class="text-xs text-gray-400 font-bold uppercase">My Rewards</p>
                    <p class="text-sm text-blue-600 font-bold" id="top-balance">-- OMT</p>
                </div>
                <div th:if="${session.loginMember == null}" class="flex items-center gap-2">
                    <a href="/join" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-xl text-sm font-bold hover:bg-slate-50 transition">회원가입</a>
                    <a href="/login" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-md">
                        <i class="fa-solid fa-right-to-bracket text-xs"></i> 로그인
                    </a>
                </div>
                <div th:if="${session.loginMember != null}" class="flex items-center gap-2">
                    <button onclick="location.href='/mypage'" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-black transition">마이페이지</button>
                    <button onclick="location.href='/logout'" class="border border-gray-300 text-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 transition">로그아웃</button>
                </div>
            </div>
        </div>
    </header>

    <main class="p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 italic">Live Price Stream</h1>
                    <p class="text-gray-500 mt-1">실시간 가격 변동 및 마켓 알림을 확인하세요.</p>
                </div>
                <div class="bg-white px-5 py-2.5 rounded-2xl border border-gray-200 shadow-sm flex items-center gap-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm font-bold text-gray-600 uppercase tracking-tighter">Updates: <span id="update-count" class="text-blue-600">0</span></span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="price-cards"></div>
        </div>
    </main>

    <div id="alert-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3"></div>

    <script>
        const prices = {
            BTC: { 
                symbol: 'BTC', name: 'Bitcoin', price: 52437.82, change24h: 3.42,
                icon: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/btc.png',
                theme: 'from-[#F7931A] to-[#FFAB40]',
                exchanges: [{ name: 'Binance', price: 52438.50 }, { name: 'Upbit', price: 52440.10 }]
            },
            ETH: { 
                symbol: 'ETH', name: 'Ethereum', price: 1662.45, change24h: 5.67,
                icon: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/eth.png',
                theme: 'from-[#627EEA] to-[#8C9EFF]',
                exchanges: [{ name: 'Binance', price: 1662.80 }, { name: 'Coinbase', price: 1661.90 }]
            },
            SOL: { 
                symbol: 'SOL', name: 'Solana', price: 98.32, change24h: -2.15,
                icon: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/sol.png',
                theme: 'from-[#14F195] to-[#9945FF]',
                exchanges: [{ name: 'Binance', price: 98.35 }, { name: 'Upbit', price: 98.40 }]
            },
            OMT: { 
                symbol: 'OMT', name: 'OMT Token', price: 30.0, change24h: 12.5,
                icon: 'https://cdn-icons-png.flaticon.com/512/7075/7075050.png',
                theme: 'from-blue-600 to-indigo-700',
                exchanges: [{ name: 'C-Chain', price: 30.00 }]
            }
        };

        let updateCount = 0;

        // 알림 기능 함수
        function showPriceAlert(symbol, change) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            const color = change > 0 ? 'bg-green-600' : 'bg-red-600';
            const icon = change > 0 ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';

            alert.className = `${color} text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-500 font-bold text-xs`;
            alert.innerHTML = `
                <div class="w-6 h-6 bg-white/20 rounded-full flex items-center justify-center"><i class="fa-solid ${icon}"></i></div>
                <span>${symbol} 변동: ${change > 0 ? '+' : ''}${change.toFixed(2)}% 감지</span>
            `;

            container.appendChild(alert);
            setTimeout(() => alert.classList.remove('translate-y-10', 'opacity-0'), 50);
            setTimeout(() => {
                alert.classList.add('opacity-0', 'scale-90');
                setTimeout(() => alert.remove(), 500);
            }, 3000);
        }

        function renderPriceCards() {
            const container = document.getElementById('price-cards');
            container.innerHTML = Object.values(prices).map(token => `
                <div class="bg-white rounded-3xl border border-gray-100 shadow-sm transition-all duration-300 overflow-hidden group" data-symbol="${token.symbol}">
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-6">
                            <div class="w-14 h-14 bg-gradient-to-br ${token.theme} rounded-2xl flex items-center justify-center p-2.5 shadow-lg group-hover:rotate-6 transition-transform">
                                <img src="${token.icon}" class="w-full h-full object-contain">
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${token.name}</p>
                                <p class="text-2xl font-black text-gray-900">${token.symbol}</p>
                            </div>
                        </div>
                        <div class="mb-6 text-center py-4 bg-gray-50 rounded-2xl border border-gray-100">
                            <p class="text-3xl font-black text-gray-900 mb-1">$${token.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                            <span class="text-xs font-bold ${token.change24h > 0 ? 'text-green-500' : 'text-red-500'}">
                                ${token.change24h > 0 ? '▲' : '▼'} ${Math.abs(token.change24h).toFixed(2)}%
                            </span>
                        </div>
                        <div class="space-y-2">
                            ${token.exchanges.map(ex => `
                                <div class="flex justify-between text-[11px] font-bold">
                                    <span class="text-gray-500">${ex.name}</span>
                                    <span class="text-gray-900">$${ex.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 실제 서버에서 시세 데이터를 가져오는 함수
        async function fetchRealPrices() {
            try {
                const res = await fetch('/api/price/stream');
                if (!res.ok) return;
                const data = await res.json();

                // 1. 기존 데이터 백업 (변동 알림용)
                const oldPrices = JSON.parse(JSON.stringify(prices));

                // 2. 새로운 데이터 반영 (테마/아이콘/거래소 정보 유지하며 가격/변동률만 업데이트)
                Object.keys(data).forEach(symbol => {
                    if (prices[symbol]) {
                        const oldPrice = prices[symbol].price;
                        const newPrice = data[symbol].price;

                        prices[symbol].price = newPrice;
                        prices[symbol].change24h = data[symbol].change24h;

                        // 알림 발생 (0.1% 이상 변동 시)
                        const changePercent = ((newPrice - oldPrice) / oldPrice) * 100;
                        if (Math.abs(changePercent) > 0.1) {
                            showPriceAlert(symbol, changePercent);
                        }

                        // 카드 애니메이션 효과 적용
                        const card = document.querySelector(`[data-symbol="${symbol}"]`);
                        if (card && oldPrice !== newPrice) {
                            card.classList.remove('price-up', 'price-down');
                            void card.offsetWidth;
                            card.classList.add(newPrice > oldPrice ? 'price-up' : 'price-down');
                        }
                    }
                });

                updateCount++;
                document.getElementById('update-count').innerText = updateCount;
                renderPriceCards();

            } catch (e) {
                console.error("Price Stream Error:", e);
            }
        }

        // 2. 실행 부분을 이렇게 수정
        document.addEventListener('DOMContentLoaded', () => {
            renderPriceCards();
            updateTopBalance();
            // 3초마다 실제 서버 데이터 요청
            priceTimer = setInterval(fetchRealPrices, 3000);
        });

        // bfcache 복원 시 잔액 초기화 (로그아웃 후 이전 값 잔상 방지)
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) {
                document.getElementById('top-balance').innerText = '-- OMT';
                updateTopBalance();
            }
        });

        // 3. [핵심] 페이지를 떠날 때 타이머를 즉시 종료!
        window.addEventListener('beforeunload', () => {
            if (priceTimer) {
                clearInterval(priceTimer);
                console.log("실시간 스트림 종료 - 메모리 해제");
            }
        });
    </script>
</body>
</html>
