<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Web3 IT Knowledge Mesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020617; overflow: hidden; }
        
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 가독성을 위해 중앙 그라데이션 강화 */
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.95) 100%);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <main class="hero-section text-center px-4">
        <div class="space-y-6 opacity-0 animate-fade-in-up">
            <div class="flex justify-center mb-2">
                <svg class="w-16 h-24 text-blue-500/80" viewBox="0 0 784.37 1277.39" fill="currentColor">
                    <g>
                        <polygon points="392.07 0 383.5 29.11 383.5 873.74 392.07 882.29 784.13 650.69"/>
                        <polygon points="392.07 0 0 650.69 392.07 882.29 392.07 472.33"/>
                        <polygon points="392.07 956.52 387.24 962.41 387.24 1263.28 392.07 1277.39 784.37 724.89"/>
                        <polygon points="392.07 1277.39 392.07 956.52 0 724.89"/>
                        <polygon points="392.07 882.29 784.13 650.69 392.07 472.33"/>
                        <polygon points="0 650.69 392.07 882.29 392.07 472.33"/>
                    </g>
                </svg>
            </div>

            <h1 class="text-8xl md:text-9xl font-black text-blue-600 tracking-tighter leading-none">
                C-Chain
            </h1>
            
            <p class="text-xl md:text-2xl font-light text-blue-200/50 max-w-2xl mx-auto tracking-wide">
                The Decentralized Hub for IT Knowledge
            </p>
        </div>

        <div class="mt-16 opacity-0 animate-fade-in animation-delay-700">
            <a href="/main" class="group relative inline-flex items-center gap-3 px-12 py-5 bg-blue-600 text-white font-bold rounded-full overflow-hidden transition-all hover:bg-blue-500 active:scale-95 shadow-[0_0_50px_rgba(37,99,235,0.4)]">
                <span>Enter Platform</span>
                <svg class="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </a>
        </div>
    </main>

    <script>
        let scene, camera, renderer, group;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('bg-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            group = new THREE.Group();
            scene.add(group);

            // 뫼비우스 배경 네트워크 (은은한 움직임 유지)
            const mobiusStrip = (u, v, target) => {
                u *= Math.PI * 2;
                v = (v - 0.5) * 2;
                const x = (35 + v * 10 * Math.cos(u / 2)) * Math.cos(u);
                const y = (35 + v * 10 * Math.cos(u / 2)) * Math.sin(u);
                const z = v * 10 * Math.sin(u / 2);
                target.set(x, y, z);
            };

            const geometry = new THREE.ParametricGeometry(mobiusStrip, 100, 30);
            
            // 파티클
            const points = new THREE.Points(geometry, new THREE.PointsMaterial({
                color: 0x3b82f6, size: 0.15, transparent: true, opacity: 0.4, blending: THREE.AddBlending
            }));
            group.add(points);

            // 엣지(선)
            const lines = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({
                color: 0x1d4ed8, transparent: true, opacity: 0.1, blending: THREE.AddBlending
            }));
            group.add(lines);

            // 배경 먼지 파티클
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for (let i = 0; i < 2000; i++) {
                starCoords.push(THREE.MathUtils.randFloatSpread(300), THREE.MathUtils.randFloatSpread(300), THREE.MathUtils.randFloatSpread(300));
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x60a5fa, size: 0.1, transparent: true, opacity: 0.2 })));

            window.addEventListener('resize', onWindowResize, false);
        }

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.001; // 아주 천천히 회전
            group.rotation.x += 0.0004;
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        animate();
    </script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in-up { animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 1.5s ease-out forwards; }
        .animation-delay-700 { animation-delay: 0.7s; }
    </style>
</body>
</html>
