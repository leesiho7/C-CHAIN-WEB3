<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Dashboard</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: "Pretendard Variable", sans-serif; letter-spacing: -0.02em; }
        .glow-card { transition: all 0.3s ease; }
        .glow-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .slide-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal { display: none; position: fixed; z-index: 100; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; width: 90%; max-width: 600px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm relative z-30">
        <div class="flex items-center space-x-6">
            <a href="/" class="flex items-center space-x-2">
                <img src="/images/Rectangle.png" alt="C-Chain" class="h-8 w-auto">
            </a>
            <span class="text-gray-400">|</span>
            <nav class="flex items-center gap-2">
                <a href="/" class="px-4 py-2 rounded-lg text-sm font-bold transition bg-blue-50 text-blue-600">IT기술문서</a>
                <a href="/indexer" class="px-4 py-2 rounded-lg text-sm font-semibold transition text-gray-600 hover:bg-gray-50 flex items-center gap-2">
                    <i class="fa-solid fa-bolt-lightning text-xs"></i> 트랜잭션 인덱서
                </a>
                <a href="/exchange" class="px-4 py-2 rounded-lg text-sm font-semibold transition text-gray-600 hover:bg-gray-50 flex items-center gap-2">
                    <i class="fa-solid fa-wallet text-xs"></i> 지갑 & 거래소
                </a>
                <a href="/price" class="px-4 py-2 rounded-lg text-sm font-semibold transition text-gray-600 hover:bg-gray-50 flex items-center gap-2">
                    <i class="fa-solid fa-arrow-trend-up text-xs"></i> 실시간 가격
                </a>
                <a href="/wallet-server" class="px-4 py-2 rounded-lg text-sm font-semibold transition text-gray-600 hover:bg-gray-50 flex items-center gap-2">
                    <i class="fa-solid fa-server text-xs"></i> 지갑 서버
                </a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase font-bold">My Rewards</p>
                <p class="text-sm font-bold text-blue-600"><span id="top-balance">0.0</span> OMT</p>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="openSubscriptionModal()" class="relative flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-bold shadow-lg active:scale-95 transition">
                    <i class="fa-solid fa-crown"></i>
                    <span class="text-sm">월구독</span>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full">NEW</span>
                </button>
                
                <div th:if="${session.loginMember == null}" class="flex items-center gap-2">
                    <a href="/join" class="px-5 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-xl text-sm font-bold hover:bg-slate-50 transition">회원가입</a>
                    <a href="/login" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-md">
                        <i class="fa-solid fa-right-to-bracket text-xs"></i><span>로그인</span>
                    </a>
                </div>

                <div th:if="${session.loginMember != null}" class="flex items-center gap-2">
                    <button onclick="location.href='/mypage'" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-black transition">마이페이지</button>
                    <button onclick="location.href='/connect'" class="flex items-center gap-2 px-4 py-2 bg-orange-50 border border-orange-200 text-orange-600 rounded-lg text-sm font-bold hover:bg-orange-100 transition">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" class="w-4 h-4">
                        <span th:text="${session.userAddress != null} ? '지갑 연결됨' : '지갑 연결'">지갑 연결</span>
                    </button>
                    <button onclick="logoutAll()" class="border border-gray-300 text-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 transition">로그아웃</button>
                    <button th:if="${session.loginMember.email == 'admin@cchain.com'}" onclick="location.href='/admin'" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold border border-red-100 flex items-center gap-1">
                        <i class="fa-solid fa-lock-open"></i> 관리자
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="p-8 h-[calc(100vh-73px)] overflow-y-auto">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-gray-900">검증 대기 중인 기술 문서</h2>
                    <p class="text-gray-500 mt-2">중국 최신 기술 문서를 번역하고 블록체인 보상을 획득하세요.</p>
                </div>
                <button onclick="checkAuth(event, openAddDocumentModal)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> 문서넣기
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                <div th:each="doc : ${documents}"
                     th:data-id="${doc.id}"
                     th:data-title="${doc.titleCn}"
                     th:data-content="${doc.contentCn}"
                     th:data-source="${doc.sourceName}"
                     th:data-status="${doc.status}"
                     onclick="openWorkspace(this)"
                     class="group bg-white p-6 rounded-2xl border border-gray-200 shadow-sm hover:border-blue-400 transition-all cursor-pointer relative overflow-hidden glow-card">
                    
                    <div th:if="${doc.status == 'COMPLETED'}" class="absolute top-0 right-0">
                        <div class="bg-gradient-to-br from-yellow-400 to-amber-600 text-white text-[10px] font-black px-8 py-1 shadow-lg transform rotate-45 translate-x-8 translate-y-2 tracking-tighter">번역 완료</div>
                    </div>

                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded">CN → KR</span>
                        <button th:onclick="'event.stopPropagation(); checkAuth(event, function(){ deleteDocument(' + ${doc.id} + '); })'" class="text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 group-hover:text-blue-600 mb-2" th:text="${doc.titleCn}">제목</h3>
                    <p class="text-sm text-gray-500 line-clamp-2 mb-4" th:text="${doc.summary}">요약 정보...</p>
                    <div class="flex items-center text-xs text-gray-400 space-x-3 border-t pt-4">
                        <span><i class="fa-regular fa-user mr-1"></i> <span th:text="${doc.sourceName}">출처</span></span>
                        <span><i class="fa-regular fa-clock mr-1"></i> <span th:text="${doc.createdAt}">시간</span></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeWorkspace()" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
    <div id="workspace" class="slide-panel fixed inset-y-0 right-0 w-[92%] bg-white z-50 shadow-2xl transform translate-x-full flex flex-col">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-white">
            <div class="flex items-center space-x-4">
                <button onclick="closeWorkspace()" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
                <div><h2 id="ws-title" class="font-bold text-gray-900 text-lg">제목</h2><p id="ws-source" class="text-xs text-gray-400">Source: Loading...</p></div>
            </div>
            <button id="submit-btn" onclick="checkAuth(event, submitWork)" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition">보상 기여 승인 요청</button>
        </div>
        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 flex flex-col border-r bg-gray-50/30">
                <div class="p-3 bg-gray-100 border-b px-8 text-[10px] font-black text-gray-400 tracking-widest uppercase">Original (CN)</div>
                <div id="original-content" class="flex-1 p-12 overflow-y-auto bg-white text-xl leading-relaxed prose max-w-none text-gray-800"></div>
            </div>
            <div class="flex-1 flex flex-col">
                <div class="p-3 bg-blue-50 border-b px-8 text-[10px] font-black text-blue-600 tracking-widest uppercase">Translation (KR)</div>
                <div class="flex-1 p-12 bg-blue-50/5">
                    <textarea id="translation-input" class="w-full h-full bg-transparent border-none focus:ring-0 text-xl leading-relaxed text-gray-800 placeholder:text-gray-300 resize-none" placeholder="번역 내용을 입력하세요..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onclick="closeLoginModal()"></div>
        <div class="relative bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <div class="text-center">
                <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-lock text-3xl"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-900 mb-2">로그인이 필요합니다</h3>
                <p class="text-gray-500 mb-8 font-medium">자산 전송, 번역, 거래소 연동 등 <br> 모든 기능을 이용하려면 가입해 보세요!</p>
                <div class="flex flex-col gap-3">
                    <a href="/login" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold shadow-lg transition text-center">로그인하러 가기</a>
                    <button onclick="closeLoginModal()" class="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-2xl font-bold transition">나중에 할게요</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tx-loader" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] hidden flex-col items-center justify-center text-white">
        <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
        <p class="mt-6 font-bold tracking-widest">CHAIN SYNCING...</p>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        
        let currentDocId = null;
        // 빨간 줄 해결: 서버 로그인 상태를 안전하게 JS 변수에 할당
        const isLoggedIn = /*[[${session.loginMember != null}]]*/ false;

        // 권한 체크 공통 함수
        function checkAuth(event, callback) {
            if (event && event.stopPropagation) event.stopPropagation();
            if (!isLoggedIn) {
                document.getElementById('login-modal').classList.remove('hidden');
                return;
            }
            if (typeof callback === 'function') callback();
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
        }

        // 워크스페이스 열기
        function openWorkspace(el) {
            currentDocId = el.dataset.id;
            document.getElementById('ws-title').innerText = el.dataset.title;
            document.getElementById('ws-source').innerText = `Source: ${el.dataset.source}`;
            document.getElementById('original-content').innerHTML = el.dataset.content;
            
            const inputArea = document.getElementById('translation-input');
            const submitBtn = document.getElementById('submit-btn');

            if (el.dataset.status === 'COMPLETED') {
                inputArea.readOnly = true;
                submitBtn.classList.add('hidden');
                inputArea.value = "번역 내용을 불러오는 중...";
                // 실제 검증 완료된 번역 내용 조회
                fetch(`/api/translation/completed/${currentDocId}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            inputArea.value = data.contentKr;
                            document.querySelector('.p-3.bg-blue-50.border-b').innerHTML =
                                `<span class="text-[10px] font-black text-blue-600 tracking-widest uppercase">✅ 검증 완료 번역본 (KR)</span>
                                 <span class="ml-3 text-[10px] text-gray-400">번역자: ${data.userEmail} · ${data.verifiedAt.substring(0,10)}</span>`;
                        } else {
                            inputArea.value = "번역 내용을 불러올 수 없습니다.";
                        }
                    })
                    .catch(() => { inputArea.value = "번역 내용을 불러올 수 없습니다."; });
            } else {
                inputArea.readOnly = false;
                submitBtn.classList.remove('hidden');
                inputArea.value = "";
                document.querySelector('.p-3.bg-blue-50.border-b').innerHTML =
                    `<span class="text-[10px] font-black text-blue-600 tracking-widest uppercase">Translation (KR)</span>`;
            }

            document.getElementById('workspace').classList.remove('translate-x-full');
            document.getElementById('overlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('overlay').classList.add('opacity-100'), 10);
        }

        function closeWorkspace() {
            document.getElementById('workspace').classList.add('translate-x-full');
            document.getElementById('overlay').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        }

        // 실시간 잔액 조회 (오류 해결 반영: WalletService 호출 가정)
        async function updateBalance() {
            if (!isLoggedIn) return;
            try {
                // 비동기 DB 대기 이슈를 해결하기 위해 직접 잔액 조회 API 호출
                const res = await fetch('/api/token/balance', { method: 'POST' });
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById('top-balance').innerText = data.balance;
                }
            } catch(e) { console.error("Balance Sync Error", e); }
        }

        // 번역 제출 (트랜잭션 시뮬레이션 로더 포함)
        async function submitWork() {
            const content = document.getElementById('translation-input').value;
            if(!content) return alert("번역본을 입력하세요.");
            if(!confirm('블록체인 검증 요청을 보내시겠습니까?')) return;

            document.getElementById('tx-loader').classList.remove('hidden');
            try {
                const res = await fetch('/api/translation/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ documentId: currentDocId, contentKr: content })
                });
                if(res.ok) { 
                    alert("제출 완료 및 OMT 보상이 지급되었습니다!"); 
                    location.reload(); 
                }
            } catch(e) { alert("통신 오류가 발생했습니다."); }
            finally { document.getElementById('tx-loader').classList.add('hidden'); }
        }

        function logoutAll() { location.href = '/logout'; }
        
        // 초기화
        window.onload = updateBalance;
        
        /*]]>*/
    </script>
</body>
</html>
