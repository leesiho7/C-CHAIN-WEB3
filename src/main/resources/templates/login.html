<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        .cchain-brand { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: #1e293b; line-height: 1; letter-spacing: -0.03em; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8">
        <div class="text-center mb-10">
            <div class="flex items-center justify-center gap-2.5 mb-4">
                <img src="/images/Rectangle.png" alt="C-Chain Logo" class="h-[52px] w-auto">
                <span class="cchain-brand">C-Chain</span>
            </div>
            <p class="text-slate-400 text-sm mt-2">한-중 기술 공유 플랫폼의 멤버가 되어보세요.</p>
        </div>

        <!-- 로그인 실패 에러 메시지 -->
        <div th:if="${loginError}" class="bg-red-50 border border-red-200 text-red-700 px-5 py-3 rounded-xl text-sm mb-4 text-center font-medium">
            <i class="fa-solid fa-circle-exclamation mr-2"></i>
            <span th:text="${loginError}"></span>
        </div>
        <!-- 회원가입 완료 메시지 -->
        <div th:if="${param.registered}" class="bg-green-50 border border-green-200 text-green-700 px-5 py-3 rounded-xl text-sm mb-4 text-center font-medium">
            <i class="fa-solid fa-circle-check mr-2"></i>
            회원가입이 완료되었습니다. 로그인해주세요.
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Email Address</label>
                    <input type="email" name="email" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-700" 
                        placeholder="이메일을 입력하세요">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Password</label>
                    <input type="password" name="userpw" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-700" 
                        placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between text-xs">
                    <label class="flex items-center text-slate-500 cursor-pointer">
                        <input type="checkbox" class="mr-2 rounded border-slate-300"> 로그인 유지
                    </label>
                    <a href="#" class="text-blue-600 font-bold hover:underline">비밀번호 찾기</a>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 active:scale-[0.98]">
                    접속하기
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center text-sm">
                <span class="text-slate-400">아직 계정이 없으신가요?</span>
                <a href="/join" class="ml-2 text-blue-600 font-bold hover:underline">회원가입</a>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-xs mt-8 font-medium italic">Verified by C-Chain Blockchain Network</p>
    </div>

</body>
</html>
