<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | 트랜잭션 인덱서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        body { background: linear-gradient(to bottom right, #f9fafb, #eff6ff, #fdf4ff); min-height: 100vh; }
        .pulse-ring { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .tx-row { transition: all 0.3s ease; }
        .tx-row:first-child { background-color: rgba(59, 130, 246, 0.05); animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="overflow-x-hidden">
    <header class="bg-white/80 backdrop-blur-md border-b px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="/" class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-link text-white text-sm"></i>
                    </div>
                    <span class="text-blue-600 text-2xl font-black">C-Chain</span>
                </a>
                <span class="text-gray-300">|</span>
                <nav class="hidden md:flex items-center gap-1">
                    <a href="/" class="px-4 py-2 rounded-xl text-sm font-semibold text-gray-500 hover:bg-gray-50 transition">IT기술문서</a>
                    <a href="/indexer" class="px-4 py-2 rounded-xl text-sm font-bold bg-blue-50 text-blue-600">
                        <i class="fa-solid fa-bolt-lightning mr-1.5 text-xs"></i>트랜잭션 인덱서
                    </a>
                    <a href="/exchange" class="px-4 py-2 rounded-xl text-sm font-semibold text-gray-500 hover:bg-gray-50 transition">지갑 & 거래소</a>
                    <a href="/price" class="px-4 py-2 rounded-xl text-sm font-semibold text-gray-500 hover:bg-gray-50 transition">실시간 가격</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] text-gray-400 uppercase font-black">My Rewards</p>
                    <p class="text-sm text-blue-600 font-bold" id="top-balance">0.0 OMT</p>
                </div>
                <button class="px-5 py-2.5 bg-gray-900 text-white rounded-xl text-sm font-bold hover:bg-black transition shadow-lg active:scale-95">
                    지갑 연결
                </button>
            </div>
        </div>
    </header>

    <main class="p-8">
        <div class="max-w-7xl mx-auto">
            <div class="mb-8">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-200">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-3xl font-black text-gray-900 tracking-tight">온체인 실시간 인덱서</h1>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="relative w-2.5 h-2.5">
                                    <span class="absolute inset-0 bg-green-400 rounded-full opacity-75 pulse-ring"></span>
                                    <span class="block w-2.5 h-2.5 bg-green-500 rounded-full"></span>
                                </div>
                                <p class="text-sm text-gray-500 font-medium">Alchemy Pro Infrastructure 연결됨 (Sepolia)</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div class="bg-white px-5 py-3 rounded-2xl border border-gray-100 shadow-sm">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Indexed</p>
                            <p class="text-xl font-black text-blue-600" id="indexed-count">0</p>
                        </div>
                        <div class="bg-white px-5 py-3 rounded-2xl border border-gray-100 shadow-sm">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Latest Block</p>
                            <p class="text-xl font-black text-gray-800" id="latest-block">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                        <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-magnifying-glass text-blue-500"></i> 필터링 설정
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[11px] font-black text-gray-400 uppercase ml-1">거래 해시</label>
                                <input type="text" placeholder="0x..." class="w-full mt-1 px-4 py-3 bg-gray-50 border-none rounded-xl text-sm font-mono focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="text-[11px] font-black text-gray-400 uppercase ml-1">자산 선택</label>
                                <select class="w-full mt-1 px-4 py-3 bg-gray-50 border-none rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option>전체 자산 (OMT + 5종)</option>
                                    <option>OMT (My Token)</option>
                                    <option>USDC (Stable)</option>
                                    <option>WETH (Ethereum)</option>
                                </select>
                            </div>
                            <div class="pt-2">
                                <div class="p-4 bg-blue-50 rounded-2xl">
                                    <p class="text-xs text-blue-700 leading-relaxed font-medium">
                                        <i class="fa-solid fa-info-circle mr-1"></i> 현재 <b>OMT</b>를 포함한 Sepolia 주요 자산 5종이 실시간으로 인덱싱되고 있습니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-3">
                    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                        <div class="px-6 py-5 border-b flex justify-between items-center bg-white">
                            <h2 class="font-bold text-gray-900">실시간 트랜잭션 피드</h2>
                            <span class="text-[10px] font-black bg-blue-600 text-white px-2 py-1 rounded">LIVE UPDATING</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50/50">
                                    <tr>
                                        <th class="px-6 py-4 text-left text-[11px] font-black text-gray-400 uppercase tracking-wider">Asset</th>
                                        <th class="px-6 py-4 text-left text-[11px] font-black text-gray-400 uppercase tracking-wider">Hash</th>
                                        <th class="px-6 py-4 text-left text-[11px] font-black text-gray-400 uppercase tracking-wider">From / To</th>
                                        <th class="px-6 py-4 text-left text-[11px] font-black text-gray-400 uppercase tracking-wider">Amount</th>
                                        <th class="px-6 py-4 text-left text-[11px] font-black text-gray-400 uppercase tracking-wider">Time / Block</th>
                                    </tr>
                                </thead>
                                <tbody id="transactions-table" class="divide-y divide-gray-50">
                                    <tr id="empty-row">
                                        <td colspan="5" class="px-6 py-20 text-center text-gray-400">
                                            <div class="flex flex-col items-center">
                                                <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                                                <p class="font-bold">온체인 데이터 동기화 중...</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://kit.fontawesome.com/your-fontawesome-key.js" crossorigin="anonymous"></script>
    <script>
        // [1] 실시간 상태 갱신 (상단 요약 바)
        async function updateStatus() {
            try {
                const res = await fetch('/api/indexer/status');
                if (!res.ok) return;
                const data = await res.json();
                
                document.getElementById('indexed-count').innerText = data.totalTransactions.toLocaleString();
                document.getElementById('latest-block').innerText = data.lastBlock.toLocaleString();
            } catch (e) { console.error("Status Sync Error"); }
        }

        // [2] 실시간 트랜잭션 리스트 갱신
        async function fetchRecentTransactions() {
            try {
                const res = await fetch('/api/indexer/recent');
                if (!res.ok) return;
                const data = await res.json();
                
                const tbody = document.getElementById('transactions-table');
                
                if (data.length > 0) {
                    tbody.innerHTML = data.map(tx => {
                        // OMT 거래인 경우 강조 스타일 적용
                        const isOMT = tx.tokenSymbol === 'OMT';
                        const symbolColor = isOMT ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600';
                        const amountColor = isOMT ? 'text-blue-600 font-black' : 'text-gray-900 font-bold';

                        return `
                            <tr class="tx-row hover:bg-gray-50/50 transition border-b border-gray-50">
                                <td class="px-6 py-4">
                                    <span class="px-2.5 py-1 rounded-lg text-[10px] font-black tracking-tighter ${symbolColor}">
                                        ${tx.tokenSymbol}
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-mono text-gray-400">${tx.txHash.slice(0, 6)}...</span>
                                        <a href="https://sepolia.etherscan.io/tx/${tx.txHash}" target="_blank" class="text-blue-500 hover:text-blue-700">
                                            <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                                        </a>
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="text-[11px] font-mono text-gray-500">
                                        <span class="text-blue-400">F:</span> ${tx.fromAddress.slice(0, 8)}...<br>
                                        <span class="text-purple-400">T:</span> ${tx.toAddress.slice(0, 8)}...
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <p class="text-sm ${amountColor}">
                                        ${(parseInt(tx.value) / 10**18).toFixed(4)} <span class="text-[10px] opacity-60">${tx.tokenSymbol}</span>
                                    </p>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="text-[10px] text-gray-400">
                                        <p class="font-bold text-gray-600">${new Date(tx.createdAt).toLocaleTimeString()}</p>
                                        <p>Block #${tx.blockNumber}</p>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (e) { console.error("Table Sync Error"); }
        }

        // [3] 초기 실행 및 인터벌 설정
        // 유료 플랜이므로 3초마다 아주 빠르게 갱신해도 거뜬합니다!
        updateStatus();
        fetchRecentTransactions();
        
        setInterval(() => {
            updateStatus();
            fetchRecentTransactions();
        }, 3000); 

        // 지갑 잔액 업데이트 (상단 바)
        async function updateTopBalance() {
            try {
                const res = await fetch('/api/token/balance', { method: 'POST' });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('top-balance').innerText = data.balance + " OMT";
                }
            } catch (e) {}
        }
        updateTopBalance();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
