<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>C-Chain | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b px-8 py-5 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-xl font-black text-slate-800 tracking-tight">C-Chain Admin <span class="text-blue-600">Console</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="/aiTest.html" class="flex items-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-xl hover:bg-blue-100 transition-all border border-blue-100 mr-2">
                <i class="fa-solid fa-robot"></i> AI 테스트 랩
            </a>

            <!-- 인덱서 제어 (관리자 전용 — 일반 유저에게 보이지 않음) -->
            <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">인덱서</span>
                <div id="indexerDot"
                     class="w-2 h-2 rounded-full transition-all"
                     th:classappend="${indexerRunning} ? 'bg-emerald-400 shadow-sm shadow-emerald-300' : 'bg-slate-300'">
                </div>
                <span id="indexerLabel" class="text-xs font-bold"
                      th:text="${indexerRunning} ? '실행중' : '중지됨'"
                      th:classappend="${indexerRunning} ? 'text-emerald-600' : 'text-slate-400'">
                </span>
                <button id="indexerToggleBtn"
                        onclick="toggleIndexer()"
                        class="ml-1 text-[10px] font-black px-2.5 py-1 rounded-lg transition-all"
                        th:classappend="${indexerRunning} ? 'bg-rose-50 text-rose-500 hover:bg-rose-100' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'"
                        th:text="${indexerRunning} ? '중지' : '시작'">
                </button>
            </div>

            <span class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full">
                <i class="fa-solid fa-user-tie mr-1"></i> admin@cchain.com
            </span>
            <a href="/logout" class="text-xs font-bold text-rose-500 hover:text-rose-600 transition">로그아웃</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-6">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-black text-slate-900 mb-2">검증 대기 리스트</h2>
                <p class="text-slate-500 text-sm">기여자가 제출한 번역의 품질을 검수하고 보상을 승인하세요.</p>
            </div>
            <div class="text-right">
                <span class="text-4xl font-black text-blue-600" th:text="${#lists.size(pendingList)}">0</span>
                <span class="text-slate-400 font-bold ml-1">PENDING</span>
            </div>
        </div>

        <div class="bg-white rounded-[32px] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50/50 text-slate-400 text-[11px] uppercase font-black tracking-widest">
                    <tr>
                        <th class="px-8 py-5">기여자 정보</th>
                        <th class="px-8 py-5">문서 제목</th>
                        <th class="px-8 py-5">상태</th>
                        <th class="px-8 py-5 text-right">상세 및 액션</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="item : ${pendingList}" class="hover:bg-slate-50/80 transition-all group">
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold text-xs uppercase" th:text="${#strings.substring(item.user.userid,0,1)}">U</div>
                                <div>
                                    <p class="font-bold text-slate-800" th:text="${item.user?.userid}">유저명</p>
                                    <p class="text-[10px] text-slate-400 font-mono" th:text="${item.user?.email}">user@email.com</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <p class="text-sm text-slate-700 font-bold leading-tight" th:text="${item.document?.titleCn}">번역 문서 제목</p>
                            <span class="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-0.5 rounded mt-1 inline-block">Technical Doc</span>
                        </td>
                        <td class="px-8 py-6">
                            <span class="flex items-center gap-1.5 text-[11px] font-black text-amber-500 bg-amber-50 px-3 py-1 rounded-full w-fit">
                                <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> WAIT_REVIEW
                            </span>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <div class="flex justify-end items-center gap-3">
                                <a th:href="@{'/admin/detail/' + ${item.id}}" 
                                   class="text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors">
                                    <i class="fa-solid fa-magnifying-glass mr-1"></i> 내용 검수
                                </a>
                                
                                <form th:action="@{/admin/approve/{id}(id=${item.id})}" method="post" onsubmit="return confirm('정말 승인하시겠습니까? 토큰이 즉시 지급됩니다.');">
                                    <button type="submit" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[11px] font-black hover:bg-blue-600 shadow-lg shadow-slate-200 transition-all active:scale-95">
                                        즉시 승인
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(pendingList)}">
                        <td colspan="4" class="px-8 py-24 text-center">
                            <div class="flex flex-col items-center gap-4">
                                <i class="fa-solid fa-circle-check text-5xl text-slate-100"></i>
                                <p class="text-slate-400 font-bold tracking-tight">모든 검증이 완료되었습니다.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

<script>
    let isRunning = /*[[${indexerRunning}]]*/ true;

    async function toggleIndexer() {
        const btn = document.getElementById('indexerToggleBtn');
        btn.disabled = true;
        btn.textContent = '처리중...';

        const endpoint = isRunning ? '/admin/indexer/stop' : '/admin/indexer/start';
        try {
            const res = await fetch(endpoint, { method: 'POST' });
            const data = await res.json();

            isRunning = data.running;
            updateIndexerUI(isRunning);
        } catch (e) {
            alert('인덱서 제어 실패: ' + e.message);
        } finally {
            btn.disabled = false;
        }
    }

    function updateIndexerUI(running) {
        const dot   = document.getElementById('indexerDot');
        const label = document.getElementById('indexerLabel');
        const btn   = document.getElementById('indexerToggleBtn');

        if (running) {
            dot.className   = 'w-2 h-2 rounded-full transition-all bg-emerald-400 shadow-sm shadow-emerald-300';
            label.className = 'text-xs font-bold text-emerald-600';
            label.textContent = '실행중';
            btn.className   = 'ml-1 text-[10px] font-black px-2.5 py-1 rounded-lg transition-all bg-rose-50 text-rose-500 hover:bg-rose-100';
            btn.textContent = '중지';
        } else {
            dot.className   = 'w-2 h-2 rounded-full transition-all bg-slate-300';
            label.className = 'text-xs font-bold text-slate-400';
            label.textContent = '중지됨';
            btn.className   = 'ml-1 text-[10px] font-black px-2.5 py-1 rounded-lg transition-all bg-emerald-50 text-emerald-600 hover:bg-emerald-100';
            btn.textContent = '시작';
        }
    }
</script>
</body>
</html>
