<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | 지갑 & 거래소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(to bottom right, #f9fafb, #e0e7ff, #fce7f3);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="main.html" class="flex items-center space-x-2">
                    <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                    </svg>
                    <span class="text-blue-600 text-2xl font-bold">C-Chain</span>
                </a>
                <span class="text-gray-400">|</span>
                <nav class="flex items-center gap-4">
                    <a href="main.html" class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">대시보드</a>
                    <a href="transaction-indexer.html" class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">트랜잭션 인덱서</a>
                    <a href="wallet-exchange.html" class="px-4 py-2 rounded-lg text-sm transition bg-blue-50 text-blue-600 font-semibold">지갑 & 거래소</a>
                    <a href="price-stream.html" class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">실시간 가격</a>
                    <a href="wallet-server.html" class="px-4 py-2 rounded-lg text-sm transition text-gray-600 hover:bg-gray-50 font-semibold">지갑 서버</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right mr-4">
                    <p class="text-xs text-gray-400 uppercase font-bold">My Rewards</p>
                    <p class="text-sm text-blue-600 font-bold">125.4 OMT</p>
                </div>
                <button class="px-5 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-50 transition shadow-sm font-bold">
                    지갑 연결
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-8">
        <div class="max-w-7xl mx-auto">
            <!-- Page Header -->
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">지갑 & 거래소 통합</h1>
                        <p class="text-gray-500 mt-1">멀티 지갑과 거래소를 한곳에서 관리하세요</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Main Portfolio -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Total Balance -->
                    <div class="bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl shadow-lg p-8 text-white">
                        <p class="text-white/80 text-sm mb-2">총 자산</p>
                        <p class="text-5xl font-bold mb-6">$45,231.87</p>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                                <p class="text-white/80 text-xs mb-1">지갑</p>
                                <p class="text-xl font-bold">$28,450</p>
                            </div>
                            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                                <p class="text-white/80 text-xs mb-1">거래소</p>
                                <p class="text-xl font-bold">$16,781</p>
                            </div>
                            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                                <p class="text-white/80 text-xs mb-1">24H 변동</p>
                                <p class="text-xl font-bold text-green-300">+5.2%</p>
                            </div>
                        </div>
                    </div>

                    <!-- Assets -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">보유 자산</h2>
                        <div class="space-y-3" id="assets-list">
                            <!-- Assets will be loaded here -->
                        </div>
                    </div>

                    <!-- Recent Transactions -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">최근 거래</h2>
                        <div class="space-y-3" id="wallet-transactions">
                            <!-- Transactions will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Right Sidebar -->
                <div class="space-y-6">
                    <!-- Connected Wallets -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">연결된 지갑</h3>
                        <div class="space-y-3" id="connected-wallets">
                            <!-- Wallets will be loaded here -->
                        </div>
                        <button class="w-full mt-4 py-3 border-2 border-dashed border-gray-300 hover:border-blue-500 hover:bg-blue-50 rounded-xl transition text-gray-600 hover:text-blue-600 font-semibold text-sm">
                            + 지갑 연결
                        </button>
                    </div>

                    <!-- Connected Exchanges -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">연결된 거래소</h3>
                        <div class="space-y-3" id="connected-exchanges">
                            <!-- Exchanges will be loaded here -->
                        </div>
                        <button class="w-full mt-4 py-3 border-2 border-dashed border-gray-300 hover:border-purple-500 hover:bg-purple-50 rounded-xl transition text-gray-600 hover:text-purple-600 font-semibold text-sm">
                            + 거래소 연결
                        </button>
                    </div>

                    <!-- Quick Transfer -->
                    <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl border border-green-200 p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">빠른 전송</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="text-sm font-semibold text-gray-700 mb-2 block">자산</label>
                                <select class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white">
                                    <option>ETH</option>
                                    <option>BTC</option>
                                    <option>USDT</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-gray-700 mb-2 block">금액</label>
                                <input type="number" placeholder="0.0" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg">
                            </div>
                            <button class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl transition shadow-md font-bold">
                                전송하기
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Mock data
        const assets = [
            { symbol: 'ETH', name: 'Ethereum', amount: '8.45', value: '$22,385', change: '+5.2%', positive: true },
            { symbol: 'BTC', name: 'Bitcoin', amount: '0.234', value: '$12,267', change: '+3.8%', positive: true },
            { symbol: 'USDT', name: 'Tether', amount: '5,420', value: '$5,420', change: '0%', positive: true },
            { symbol: 'OMT', name: 'OMT Token', amount: '125.4', value: '$3,762', change: '+12.5%', positive: true }
        ];

        const wallets = [
            { name: 'MetaMask', address: '0x742d35Cc...595f0bEb', balance: '$28,450', status: 'connected' },
            { name: 'Trust Wallet', address: '0x8f3Cf7ad...239c6A063', balance: '$0', status: 'disconnected' }
        ];

        const exchanges = [
            { name: 'Binance', status: 'connected', balance: '$12,340' },
            { name: 'Coinbase', status: 'connected', balance: '$4,441' },
            { name: 'Upbit', status: 'disconnected', balance: '$0' }
        ];

        const transactions = [
            { type: 'send', asset: 'ETH', amount: '0.5', to: '0x742d35Cc...595f0bEb', time: '2분 전' },
            { type: 'receive', asset: 'BTC', amount: '0.012', from: 'Binance', time: '1시간 전' },
            { type: 'send', asset: 'USDT', amount: '500', to: 'Coinbase', time: '3시간 전' }
        ];

        // Render assets
        document.getElementById('assets-list').innerHTML = assets.map(asset => `
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold">
                        ${asset.symbol[0]}
                    </div>
                    <div>
                        <p class="font-bold text-gray-900">${asset.symbol}</p>
                        <p class="text-sm text-gray-500">${asset.name}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-gray-900">${asset.amount} ${asset.symbol}</p>
                    <div class="flex items-center gap-2 justify-end">
                        <p class="text-sm text-gray-600">${asset.value}</p>
                        <span class="text-xs font-semibold ${asset.positive ? 'text-green-600' : 'text-red-600'}">${asset.change}</span>
                    </div>
                </div>
            </div>
        `).join('');

        // Render wallets
        document.getElementById('connected-wallets').innerHTML = wallets.map(wallet => `
            <div class="p-4 bg-gray-50 rounded-xl">
                <div class="flex items-center justify-between mb-2">
                    <p class="font-bold text-gray-900">${wallet.name}</p>
                    <span class="w-2 h-2 ${wallet.status === 'connected' ? 'bg-green-500' : 'bg-gray-400'} rounded-full"></span>
                </div>
                <p class="text-xs text-gray-500 font-mono mb-2">${wallet.address}</p>
                <p class="text-sm font-semibold text-gray-700">${wallet.balance}</p>
            </div>
        `).join('');

        // Render exchanges
        document.getElementById('connected-exchanges').innerHTML = exchanges.map(exchange => `
            <div class="p-4 bg-gray-50 rounded-xl">
                <div class="flex items-center justify-between mb-2">
                    <p class="font-bold text-gray-900">${exchange.name}</p>
                    <span class="text-xs ${exchange.status === 'connected' ? 'text-green-600 bg-green-100' : 'text-gray-500 bg-gray-200'} px-2 py-1 rounded-full font-semibold">${exchange.status === 'connected' ? '연결됨' : '연결안됨'}</span>
                </div>
                <p class="text-sm font-semibold text-gray-700">${exchange.balance}</p>
            </div>
        `).join('');

        // Render transactions
        document.getElementById('wallet-transactions').innerHTML = transactions.map(tx => `
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 ${tx.type === 'send' ? 'bg-red-100' : 'bg-green-100'} rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 ${tx.type === 'send' ? 'text-red-600' : 'text-green-600'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${tx.type === 'send' ? 'M7 11l5-5m0 0l5 5m-5-5v12' : 'M17 13l-5 5m0 0l-5-5m5 5V6'}"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-semibold text-gray-900">${tx.type === 'send' ? '전송' : '수신'} ${tx.amount} ${tx.asset}</p>
                        <p class="text-xs text-gray-500">${tx.type === 'send' ? tx.to : tx.from} • ${tx.time}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
