<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | 지갑 & 거래소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        body { background: linear-gradient(to bottom right, #f9fafb, #e0e7ff, #fce7f3); min-height: 100vh; }
    </style>
</head>
<body>
    <header class="bg-white border-b px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="/main" class="flex items-center space-x-2">
                    <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                    </svg>
                    <span class="text-blue-600 text-2xl font-bold">C-Chain</span>
                </a>
                <span class="text-gray-400">|</span>
                <nav class="flex items-center gap-4">
                    <a href="/main"          class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 font-semibold transition">대시보드</a>
                    <a href="/indexer"       class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 font-semibold transition">트랜잭션 인덱서</a>
                    <a href="/exchange"      class="px-4 py-2 rounded-lg text-sm bg-blue-50 text-blue-600 font-semibold">지갑 &amp; 거래소</a>
                    <a href="/price"         class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 font-semibold transition">실시간 가격</a>
                    <a href="/wallet-server" class="px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 font-semibold transition">지갑 서버</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right mr-4">
                    <p class="text-xs text-gray-400 uppercase font-bold">My Rewards</p>
                    <p class="text-sm text-blue-600 font-bold" id="top-omt-balance">-- OMT</p>
                </div>
                <div th:if="${session.loginMember == null}" class="flex items-center gap-2">
                    <a href="/join" class="px-4 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-xl text-sm font-bold hover:bg-slate-50 transition">회원가입</a>
                    <a href="/login" class="flex items-center gap-2 px-4 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-md">
                        <i class="fa-solid fa-right-to-bracket text-xs"></i> 로그인
                    </a>
                </div>
                <div th:if="${session.loginMember != null}" class="flex items-center gap-2">
                    <button onclick="location.href='/mypage'" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-black transition">마이페이지</button>
                    <button onclick="location.href='/logout'" class="border border-gray-300 text-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 transition">로그아웃</button>
                </div>
            </div>
        </div>
    </header>

    <main class="p-8">
        <div class="max-w-7xl mx-auto">
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">지갑 &amp; 거래소 통합</h1>
                        <p class="text-gray-500 mt-1">멀티 지갑과 거래소를 한곳에서 관리하세요</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <!-- 총 자산 카드 -->
                    <div class="bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl shadow-lg p-8 text-white">
                        <p class="text-white/80 text-sm mb-2">총 자산</p>
                        <p class="text-5xl font-bold mb-6" id="total-balance">$--</p>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                                <p class="text-white/80 text-xs mb-1">ETH 잔액</p>
                                <p class="text-xl font-bold" id="eth-balance">-- ETH</p>
                            </div>
                            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                                <p class="text-white/80 text-xs mb-1">OMT 잔액</p>
                                <p class="text-xl font-bold" id="omt-balance">-- OMT</p>
                            </div>
                            <div class="bg-white/10 backdrop-blur rounded-xl p-4">
                                <p class="text-white/80 text-xs mb-1">ETH 24H 변동</p>
                                <p class="text-xl font-bold" id="eth-change">--%</p>
                            </div>
                        </div>
                    </div>

                    <!-- 보유 자산 -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">보유 자산</h2>
                        <div class="space-y-3" id="assets-list">
                            <p class="text-center text-gray-400 py-8">데이터 로딩 중...</p>
                        </div>
                    </div>

                    <!-- 최근 거래 -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">최근 거래</h2>
                        <div class="space-y-3" id="wallet-transactions">
                            <p class="text-center text-gray-400 py-8">데이터 로딩 중...</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <!-- 연결된 지갑 -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">연결된 지갑</h3>
                        <div class="space-y-3" id="connected-wallets">
                            <p class="text-center text-gray-400 py-4">로딩 중...</p>
                        </div>
                        <button class="w-full mt-4 py-3 border-2 border-dashed border-gray-300 hover:border-blue-500 hover:bg-blue-50 rounded-xl transition text-gray-600 hover:text-blue-600 font-semibold text-sm">
                            + 지갑 연결
                        </button>
                    </div>

                    <!-- 연결된 거래소 -->
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">연결된 거래소</h3>
                        <div class="space-y-3" id="connected-exchanges">
                            <div class="p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center justify-between mb-2">
                                    <p class="font-bold text-gray-900">Binance</p>
                                    <span class="text-xs text-gray-500 bg-gray-200 px-2 py-1 rounded-full font-semibold">준비 중</span>
                                </div>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center justify-between mb-2">
                                    <p class="font-bold text-gray-900">Upbit</p>
                                    <span class="text-xs text-gray-500 bg-gray-200 px-2 py-1 rounded-full font-semibold">준비 중</span>
                                </div>
                            </div>
                        </div>
                        <button class="w-full mt-4 py-3 border-2 border-dashed border-gray-300 hover:border-purple-500 hover:bg-purple-50 rounded-xl transition text-gray-600 hover:text-purple-600 font-semibold text-sm">
                            + 거래소 연결
                        </button>
                    </div>

                    <!-- 빠른 전송 -->
                    <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl border border-green-200 p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">빠른 전송</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="text-sm font-semibold text-gray-700 mb-2 block">자산</label>
                                <select class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white">
                                    <option>ETH</option>
                                    <option>OMT</option>
                                    <option>USDT</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-sm font-semibold text-gray-700 mb-2 block">금액</label>
                                <input type="number" placeholder="0.0" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg">
                            </div>
                            <button class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl transition shadow-md font-bold">
                                전송하기
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        function getCoinLogo(symbol) {
            if (symbol === 'OMT') return 'https://cdn-icons-png.flaticon.com/512/7075/7075050.png';
            return `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${symbol.toLowerCase()}.png`;
        }

        function renderAssets(ethBalance, ethPrice, omtBalance) {
            const assets = [
                { symbol: 'ETH', name: 'Ethereum',  amount: ethBalance.toFixed(4), value: ethBalance * ethPrice, color: 'from-blue-500 to-indigo-600' },
                { symbol: 'OMT', name: 'OMT Token', amount: omtBalance.toFixed(2),  value: omtBalance,           color: 'from-purple-500 to-pink-600' }
            ];
            document.getElementById('assets-list').innerHTML = assets.map(asset => `
                <div class="group flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl hover:shadow-md hover:border-blue-100 transition-all duration-300">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full overflow-hidden bg-gray-50 flex items-center justify-center p-2 shadow-inner">
                                <img src="${getCoinLogo(asset.symbol)}" alt="${asset.symbol}"
                                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/1175/1175277.png'"
                                     class="w-full h-full object-contain group-hover:scale-110 transition-transform">
                            </div>
                            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-white rounded-full flex items-center justify-center shadow-sm">
                                <div class="w-3 h-3 rounded-full bg-gradient-to-br ${asset.color}"></div>
                            </div>
                        </div>
                        <div>
                            <p class="font-black text-gray-900 leading-tight">${asset.symbol}</p>
                            <p class="text-xs font-medium text-gray-400">${asset.name}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-gray-900">${Number(asset.amount).toLocaleString()} ${asset.symbol}</p>
                        <p class="text-sm font-bold text-gray-500">$${asset.value.toLocaleString(undefined, {maximumFractionDigits: 2})}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderWallet(walletAddress) {
            const shortAddr = walletAddress
                ? walletAddress.slice(0, 8) + '...' + walletAddress.slice(-6)
                : '미연결';
            document.getElementById('connected-wallets').innerHTML = `
                <div class="p-4 bg-gray-50 rounded-xl">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-bold text-gray-900">MetaMask</p>
                        <span class="w-2 h-2 ${walletAddress ? 'bg-green-500' : 'bg-gray-400'} rounded-full"></span>
                    </div>
                    <p class="text-xs text-gray-500 font-mono mb-1">${shortAddr}</p>
                </div>`;
        }

        function renderTransactions(txs) {
            if (!txs || txs.length === 0) {
                document.getElementById('wallet-transactions').innerHTML =
                    '<p class="text-center text-gray-400 py-8">거래 내역이 없습니다.</p>';
                return;
            }
            document.getElementById('wallet-transactions').innerHTML = txs.map(tx => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-arrow-right-arrow-left text-blue-600 text-sm"></i>
                        </div>
                        <div>
                            <p class="font-semibold text-gray-900">${tx.tokenSymbol} 전송</p>
                            <p class="text-xs text-gray-500 font-mono">${tx.txHash ? tx.txHash.slice(0, 14) + '...' : ''} • Block #${tx.blockNumber}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-gray-800">${(parseInt(tx.value) / 10**18).toFixed(4)}</p>
                        <p class="text-xs text-gray-400">${tx.status}</p>
                    </div>
                </div>
            `).join('');
        }

        async function loadDashboard() {
            try {
                const res = await fetch('/api/dashboard/summary');
                if (!res.ok) return;
                const data = await res.json();

                const s = data.summary;

                // 총 자산 카드
                document.getElementById('total-balance').innerText =
                    '$' + (s.totalBalanceUsd || 0).toLocaleString(undefined, {maximumFractionDigits: 2});
                document.getElementById('eth-balance').innerText =
                    (s.ethBalance || 0).toFixed(4) + ' ETH';
                document.getElementById('omt-balance').innerText =
                    (s.omtBalance || 0).toFixed(2) + ' OMT';
                document.getElementById('top-omt-balance').innerText =
                    (s.omtBalance || 0).toFixed(2) + ' OMT';

                const change = s.ethChange24h || 0;
                const changeEl = document.getElementById('eth-change');
                changeEl.innerText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.className = 'text-xl font-bold ' + (change >= 0 ? 'text-green-300' : 'text-red-300');

                // 자산 목록
                renderAssets(s.ethBalance || 0, s.ethPrice || 0, s.omtBalance || 0);

                // 지갑
                renderWallet(data.walletAddress);

                // 최근 거래
                renderTransactions(data.recentTransactions);

            } catch (e) {
                console.error('Dashboard load error:', e);
            }
        }

        // 초기 로드 및 30초마다 갱신
        loadDashboard();
        setInterval(loadDashboard, 30000);

        // bfcache 복원 시 잔액 초기화
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) {
                document.getElementById('top-omt-balance').innerText = '-- OMT';
                loadDashboard();
            }
        });
    </script>
</body>
</html>
